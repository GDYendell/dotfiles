# yaml-language-server: $schema=https://raw.githubusercontent.com/amnweb/yasb/main/schema.json

# Configuration generated by YASB Setup Wizard.
# For more information, visit https://github.com/amnweb/yasb/wiki
watch_stylesheet: true
watch_config: true
debug: false
update_check: true
bars:
  primary-bar:
    enabled: true
    screens:
      - primary
    class_name: yasb-bar
    alignment:
      position: top
      align: center
    animation:
      enabled: true
      duration: 300
    blur_effect:
      enabled: true
      round_corners: true
      round_corners_type: normal
      border_color: "#6272A4"
    window_flags:
      always_on_top: false
      windows_app_bar: true
    dimensions:
      width: 100%
      height: 28
    padding:
      top: 0
      left: 2
      bottom: 2
      right: 2
    widgets:
      left:
        - clock
        - glazewm_workspaces
        - active_window
      center:
        - media
      right:
        - cpu
        - memory
        - open_meteo
        - quick_launch
        - microphone
        - volume
        - home
widgets:
  home:
    type: yasb.home.HomeWidget
    options:
      label: ""
      system_menu: false
      power_menu: true
      blur: true
      round_corners: true
      round_corners_type: normal
      border_color: System
      alignment: left
      offset_left: -12
  clock:
    type: yasb.clock.ClockWidget
    options:
      label: "{%H:%M}<span>{alarm}</span>"
      label_alt: "{%a, %d %b %H:%M}"
      timezones: []
      calendar:
        blur: true
        round_corners: true
        alignment: center
        direction: down
        extended: false
        show_years: true
        show_holidays: false
        show_week_numbers: true
      callbacks:
        on_left: toggle_calendar
        on_middle: toggle_label
        on_right: context_menu
  volume:
    type: yasb.volume.VolumeWidget
    options:
      label: <span>{icon}</span>
      label_alt: <span>{icon}</span>{level}
      tooltip: true
      volume_icons:
        - "\uE74F"
        - "\uE992"
        - "\uE993"
        - "\uE994"
        - "\uE995"
      callbacks:
        on_left: toggle_volume_menu
        on_right: toggle_mute
      audio_menu:
        blur: true
        round_corners: true
        round_corners_type: normal
        border_color: system
        alignment: right
        direction: down
        show_apps: true
        show_app_labels: false
        show_app_icons: true
        show_apps_expanded: false
        app_icons:
          toggle_down: "\uE972"
          toggle_up: "\uE971"
  notifications:
    type: yasb.notifications.NotificationsWidget
    options:
      label: "<span>\uF2A5</span>"
      label_alt: "{count} notifications"
      hide_empty: true
      tooltip: false
      callbacks:
        on_left: toggle_notification
        on_right: do_nothing
        on_middle: do_nothing
  power_menu:
    type: yasb.power_menu.PowerMenuWidget
    options:
      label: "<span>\uE712</span>"
      uptime: true
      show_user: true
      menu_style: popup
      popup:
        blur: true
        round_corners: true
        round_corners_type: normal
        border_color: System
        alignment: right
        offset_left: 12
      profile_image_size: 64
      buttons:
        lock:
          - "\uDB80\uDF41"
          - Lock
        signout:
          - "\uDB80\uDF43"
          - Sign out
        sleep:
          - "\uDB82\uDD04"
          - Sleep
        hibernate:
          - "\uDB82\uDD01"
          - Hibernate
        restart:
          - "\uDB81\uDC53"
          - Restart
        shutdown:
          - "\uDB82\uDD06"
          - Shut Down
        cancel:
          - ""
          - Cancel
  glazewm_workspaces:
    type: glazewm.workspaces.GlazewmWorkspacesWidget
    options:
      hide_if_offline: true
      monitor_exclusive: false
  cpu:
    type: yasb.cpu.CpuWidget
    options:
      label: "<span>\uEEA1</span> {info[percent][total]}%"
      label_alt: "{info[freq][current]} MHz"
      update_interval: 2000
      hide_decimal: true
      menu:
        enabled: true
        show_graph: true
        show_graph_grid: true
        graph_history_size: 60
        alignment: center
      callbacks:
        on_left: toggle_menu
        on_middle: do_nothing
        on_right: toggle_label
  memory:
    type: yasb.memory.MemoryWidget
    options:
      label: "<span>\uE9D9</span> {virtual_mem_free}"
      label_alt: "<span>\uEFC5</span> VIRT: {virtual_mem_percent}% SWAP: {swap_mem_percent}%"
      update_interval: 5000
      hide_decimal: true
      callbacks:
        on_left: toggle_menu
        on_middle: do_nothing
        on_right: toggle_label
      menu:
        enabled: true
        show_graph: true
        show_graph_grid: true
        graph_history_size: 60
        alignment: center
  quick_launch:
    type: yasb.quick_launch.QuickLaunchWidget
    options:
      # label: "<span>\uE71E</span>"
      label: ""
      search_placeholder: Search applications...
      max_results: 30
      show_icons: true
      icon_size: 16
      compact_text: true
      providers:
        apps:
          enabled: true
          prefix: "*"
          priority: 0
          show_recent: true
          max_recent: 5
          show_description: true
      popup:
        width: 720
        height: 480
        blur: true
        round_corners: true
        round_corners_type: normal
        border_color: system
        dark_mode: true
      callbacks:
        on_left: toggle_quick_launch
      keybindings:
        - keys: alt+space
          action: toggle_quick_launch
          screen: primary
  active_window:
    type: yasb.active_window.ActiveWindowWidget
    options:
      label: "{win[title]}"
      label_alt: "[class_name='{win[class_name]}' exe='{win[process][name]}' hwnd={win[hwnd]}]"
      label_no_window: ""
      label_icon: true
      label_icon_size: 20
      max_length: 60
      max_length_ellipsis: "..."
      monitor_exclusive: false
  open_meteo:
    type: yasb.open_meteo.OpenMeteoWidget
    options:
      label: "<span>\uE706</span>{temp}"
      label_alt: "{location}: Min {min_temp}, Max {max_temp}, Humidity {humidity}"
      tooltip: true
      update_interval: 600
      hide_decimal: true
      units: metric
      callbacks:
        on_left: toggle_card
        on_middle: do_nothing
        on_right: toggle_label
      icons:
        sunnyDay: "\uE706"
        clearNight: "\uEC46"
      weather_card:
        blur: true
        alignment: right
        direction: down
        icon_size: 32
        show_hourly_forecast: true
        time_format: 24h
        hourly_point_spacing: 76
        hourly_icon_size: 16
        icon_smoothing: true
        temp_line_width: 2
        current_line_color: "#8EAEE8"
        current_line_width: 1
        current_line_style: dot
        hourly_forecast_buttons:
          enabled: false
        weather_animation:
          enabled: true
          snow_overrides_rain: true
          temp_line_animation_style: both
          rain_effect_intensity: 1.0
          snow_effect_intensity: 1.0
          scale_with_chance: true
  github:
    type: yasb.github.GithubWidget
    options:
      label: "<span>\uEBA1</span>"
      label_alt: Notifications {data}
      max_notification: 50
      notification_dot:
        enabled: true
        corner: top_right
        color: "#ef4747"
        margin:
          - 0
          - 3
      only_unread: false
      show_comment_count: true
      max_field_size: 54
      update_interval: 300
      icons:
        comment: "\uE90A"
      menu:
        blur: true
        round_corners: true
        round_corners_type: normal
        border_color: System
        alignment: center
        direction: down
        show_categories: true
        categories_order:
          - Issue
          - PullRequest
          - CheckSuite
          - Release
          - Discussion
  microphone:
    type: yasb.microphone.MicrophoneWidget
    options:
      label: <span>{icon}</span>
      label_alt: <span>{icon}</span> {level}
      mute_text: mute
      icons:
        normal: "\uEC71"
        muted: "\uE720"
      mic_menu:
        blur: true
        round_corners: true
        round_corners_type: normal
        border_color: system
        alignment: right
        direction: down
      callbacks:
        on_left: toggle_mic_menu
        on_middle: toggle_label
        on_right: toggle_mute
  media:
    type: yasb.media.MediaWidget
    options:
      label: "{title}{s}{artist}"
      label_alt: "{title}"
      separator: " - "
      hide_empty: true
      callbacks:
        on_left: toggle_media_menu
        on_middle: do_nothing
        on_right: do_nothing
      max_field_size:
        label: 200
        label_alt: 200
      show_thumbnail: true
      controls_only: false
      controls_left: true
      controls_hide: true
      thumbnail_alpha: 100
      thumbnail_padding: 200
      thumbnail_edge_fade: true
      icons:
        prev_track: "\uE892"
        next_track: "\uE893"
        play: "\uE768"
        pause: "\uE769"
      media_menu:
        blur: true
        round_corners: true
        round_corners_type: normal
        border_color: system
        alignment: center
        direction: down
        thumbnail_corner_radius: 8
        thumbnail_size: 120
        max_title_size: 60
        max_artist_size: 40
        show_volume_slider: true
      scrolling_label:
        enabled: true
        style: bounce
        update_interval_ms: 40
